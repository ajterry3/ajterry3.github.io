<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hypertrophy Snake Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #2c3e50; font-family: sans-serif; color: white; padding: 20px; }
        #score-bar { display: flex; gap: 40px; margin-bottom: 14px; }
        .score-box { text-align: center; }
        .score-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #bdc3c7; }
        .score-val { font-size: 32px; font-weight: bold; color: #2ecc71; }
        #game-wrap { position: relative; }
        canvas { display: block; border-radius: 8px; border: 3px solid #3498db; background: #f5f5f0; }
        #overlay { position: absolute; inset: 0; border-radius: 8px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        #overlay h2 { color: #fff; font-size: 24px; }
        #overlay p { color: rgba(255,255,255,0.7); font-size: 14px; }
        .final-score { color: #2ecc71; font-size: 18px; font-weight: bold; }
        #start-btn { background: #2ecc71; color: white; border: none; padding: 12px 32px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #start-btn:hover { background: #27ae60; }
        #back-link { margin-top: 16px; color: #3498db; text-decoration: none; font-size: 14px; }
        #back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="score-bar">
        <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
        <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
    </div>
    <div id="game-wrap">
        <canvas id="snakeGame" width="360" height="360"></canvas>
        <div id="overlay">
            <h2 id="ov-title">Hypertrophy Snake</h2>
            <p id="ov-sub">Collect your protein!</p>
            <p class="final-score" id="ov-final" style="display:none;"></p>
            <button id="start-btn">Play</button>
            <p style="font-size:12px; color:rgba(255,255,255,0.5);">Arrow keys or WASD</p>
        </div>
    </div>
    <a href="scratch.html" id="back-link">← Back to Scratch Page</a>

    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const COLS = 18, ROWS = 18, CELL = canvas.width / COLS;
        let snake, dir, nextDir, food, score, best = 0, running = false, loop;

        const scoreEl = document.getElementById('score');
        const bestEl  = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub   = document.getElementById('ov-sub');
        const ovFinal = document.getElementById('ov-final');
        const btn     = document.getElementById('start-btn');

        function rnd(max) { return Math.floor(Math.random() * max); }

        function spawnFood() {
            let pos;
            do { pos = { x: rnd(COLS), y: rnd(ROWS) }; }
            while (snake.some(s => s.x === pos.x && s.y === pos.y));
            return pos;
        }

        function init() {
            const mid = Math.floor(COLS / 2);
            snake = [{ x: mid, y: mid }, { x: mid-1, y: mid }, { x: mid-2, y: mid }];
            dir = nextDir = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = 0;
            food = spawnFood();
        }

        function drawRoundedRect(x, y, w, h, r, fill) {
            ctx.fillStyle = fill;
            ctx.beginPath();
            ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
            ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
            ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
            ctx.closePath(); ctx.fill();
        }

        function drawEyes(seg, d) {
            const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
            const off = CELL*0.22, fwd = CELL*0.18, eyeR = CELL*0.09, pupR = CELL*0.05;
            let e1, e2;
            if (d.x===1)       { e1={x:cx+fwd,y:cy-off}; e2={x:cx+fwd,y:cy+off}; }
            else if (d.x===-1) { e1={x:cx-fwd,y:cy-off}; e2={x:cx-fwd,y:cy+off}; }
            else if (d.y===-1) { e1={x:cx-off,y:cy-fwd}; e2={x:cx+off,y:cy-fwd}; }
            else               { e1={x:cx-off,y:cy+fwd}; e2={x:cx+off,y:cy+fwd}; }
            [e1,e2].forEach(e => {
                ctx.beginPath(); ctx.arc(e.x,e.y,eyeR,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
                ctx.beginPath(); ctx.arc(e.x,e.y,pupR,0,Math.PI*2); ctx.fillStyle='#333'; ctx.fill();
            });
        }

        function draw() {
            ctx.fillStyle = '#f5f5f0'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#e0e0d8'; ctx.lineWidth = 0.5;
            for (let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke(); }
            for (let j=0;j<=ROWS;j++) { ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width,j*CELL); ctx.stroke(); }
            snake.forEach((seg,i) => {
                const col = i===0 ? '#4CAF50' : (i%2===0 ? '#66BB6A' : '#81C784');
                drawRoundedRect(seg.x*CELL+2, seg.y*CELL+2, CELL-4, CELL-4, 5, col);
            });
            drawEyes(snake[0], dir);
            const fx=food.x*CELL+CELL/2, fy=food.y*CELL+CELL/2, fr=CELL/2-3;
            ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2); ctx.fillStyle='#E53935'; ctx.fill();
            ctx.beginPath(); ctx.arc(fx-fr*0.2,fy-fr*0.6,fr*0.25,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();
        }

        function step() {
            dir = nextDir;
            const head = { x: snake[0].x+dir.x, y: snake[0].y+dir.y };
            if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
                clearInterval(loop); running = false;
                ovTitle.textContent = 'Game Over!';
                ovSub.style.display = 'none';
                ovFinal.style.display = 'block';
                ovFinal.textContent = 'Score: ' + score;
                btn.textContent = 'Play Again';
                overlay.style.display = 'flex';
                return;
            }
            snake.unshift(head);
            if (head.x===food.x && head.y===food.y) {
                score++; scoreEl.textContent = score;
                if (score>best) { best=score; bestEl.textContent=best; }
                food = spawnFood();
            } else { snake.pop(); }
            draw();
        }

        btn.addEventListener('click', () => {
            overlay.style.display = 'none';
            ovSub.style.display = 'block';
            ovFinal.style.display = 'none';
            init(); draw();
            clearInterval(loop);
            loop = setInterval(step, 120);
            running = true;
        });

        document.addEventListener('keydown', e => {
            if (!running) return;
            if ((e.key==='ArrowLeft'||e.key==='a'||e.key==='A') && dir.x!==1)  nextDir={x:-1,y:0};
            if ((e.key==='ArrowRight'||e.key==='d'||e.key==='D') && dir.x!==-1) nextDir={x:1,y:0};
            if ((e.key==='ArrowUp'||e.key==='w'||e.key==='W') && dir.y!==1)   nextDir={x:0,y:-1};
            if ((e.key==='ArrowDown'||e.key==='s'||e.key==='S') && dir.y!==-1) nextDir={x:0,y:1};
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });

        draw();
    </script>
</body>
</html>
